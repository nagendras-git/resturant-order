<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderCheck — Restaurant Bill Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --cream: #ede7d6;
    --accent: #c8401a;
    --gold: #d4a847;
    --muted: #8a7d6b;
    --success: #2e7d55;
    --line: rgba(26,18,9,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, var(--line) 27px, var(--line) 28px);
    background-size: 100% 28px;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    padding: 2.5rem 1rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 10px,
      rgba(255,255,255,0.025) 10px, rgba(255,255,255,0.025) 11px
    );
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    position: relative;
  }
  header h1 span { color: var(--gold); }
  header p {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
  }
  .header-rule {
    width: 60px; height: 2px;
    background: var(--gold);
    margin: 1rem auto 0;
    position: relative;
  }

  /* ── Layout ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }
  @media (max-width: 620px) {
    .container { grid-template-columns: 1fr; }
  }

  /* ── Panel ── */
  .panel {
    background: #fff9f0;
    border: 1.5px solid var(--line);
    border-radius: 2px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .panel-head {
    padding: 1rem 1.2rem 0.8rem;
    border-bottom: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .panel-head .icon {
    font-size: 1.1rem;
    width: 28px; height: 28px;
    background: var(--ink);
    color: var(--gold);
    border-radius: 50%;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .panel-head h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  /* ── Form ── */
  .form-body { padding: 1.2rem; display: flex; flex-direction: column; gap: 0.9rem; }

  label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--line);
    border-radius: 2px;
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  .btn-add {
    width: 100%;
    padding: 0.75rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 3px 3px 0 rgba(200,64,26,0.3);
  }
  .btn-add:hover { background: #a83314; }
  .btn-add:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(200,64,26,0.3); }

  /* ── Bill Panel ── */
  .bill-body { padding: 0; }

  /* restaurant name strip */
  .restaurant-strip {
    padding: 0.8rem 1.2rem;
    border-bottom: 1.5px dashed var(--line);
    display: flex; align-items: center; gap: 0.6rem;
  }
  .restaurant-strip input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--ink);
    outline: none;
  }
  .restaurant-strip input::placeholder { color: var(--muted); }

  /* items list */
  #order-list {
    list-style: none;
    max-height: 340px;
    overflow-y: auto;
  }
  #order-list::-webkit-scrollbar { width: 4px; }
  #order-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

  .order-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 0.5rem;
    align-items: center;
    padding: 0.65rem 1.2rem;
    border-bottom: 1px dashed var(--line);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .order-item:hover { background: rgba(212,168,71,0.06); }

  .item-name {
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-cat {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 1px;
  }
  .item-qty {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.78rem; color: var(--muted);
  }
  .qty-btn {
    width: 20px; height: 20px;
    border: 1px solid var(--line);
    background: var(--cream);
    border-radius: 50%;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 0.9rem; line-height: 1;
    transition: background 0.12s;
    color: var(--ink);
  }
  .qty-btn:hover { background: var(--gold); }

  .item-price {
    font-size: 0.88rem;
    font-weight: 500;
    text-align: right;
    min-width: 70px;
  }
  .item-remove {
    background: none; border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    padding: 0 0 0 0.4rem;
    transition: color 0.12s;
  }
  .item-remove:hover { color: var(--accent); }

  .empty-state {
    padding: 2.5rem 1.2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
  }
  .empty-state .plate { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.4; }

  /* ── Totals ── */
  .totals {
    border-top: 2px solid var(--ink);
    padding: 1rem 1.2rem;
  }
  .totals-row {
    display: flex; justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  .totals-row.grand {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--ink);
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1.5px solid var(--line);
  }
  .totals-row.grand .amount { color: var(--accent); }

  /* Tax / tip inputs row */
  .totals-inputs {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.6rem; margin-bottom: 0.8rem;
  }
  .totals-inputs label { font-size: 0.65rem; }
  .totals-inputs input {
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
  }

  /* ── Validate section ── */
  .validate-section { padding: 0 1.2rem 1.2rem; }
  .validate-row {
    display: flex; gap: 0.6rem; align-items: flex-end;
  }
  .validate-row > div { flex: 1; }
  .validate-row label { font-size: 0.65rem; }

  .btn-validate {
    padding: 0.6rem 1rem;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    box-shadow: 3px 3px 0 rgba(26,18,9,0.25);
  }
  .btn-validate:hover { background: #2e2010; }

  .verdict {
    margin-top: 0.8rem;
    padding: 0.7rem 0.9rem;
    border-radius: 2px;
    font-size: 0.82rem;
    display: none;
    animation: slideIn 0.2s ease;
  }
  .verdict.ok   { background: rgba(46,125,85,0.1); border: 1.5px solid var(--success); color: var(--success); }
  .verdict.over { background: rgba(200,64,26,0.08); border: 1.5px solid var(--accent); color: var(--accent); }
  .verdict.under{ background: rgba(212,168,71,0.1); border: 1.5px solid var(--gold); color: #8a6010; }
  .verdict .diff { font-weight: 700; }

  /* ── Actions ── */
  .actions { display: flex; gap: 0.6rem; padding: 0 1.2rem 1.2rem; }
  .btn-ghost {
    flex: 1; padding: 0.55rem;
    background: none;
    border: 1.5px solid var(--line);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.12s;
  }
  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

  /* ── Summary chip ── */
  .summary-chips {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    padding: 0.8rem 1.2rem;
    border-bottom: 1px dashed var(--line);
  }
  .chip {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 0.3rem 0.6rem;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .chip strong { color: var(--ink); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Order<span>Check</span></h1>
  <p>Restaurant Bill Tracker</p>
  <div class="header-rule"></div>
</header>

<div class="container">

  <!-- ADD ITEM PANEL -->
  <div class="panel">
    <div class="panel-head">
      <div class="icon">＋</div>
      <h2>Add Order Item</h2>
    </div>
    <div class="form-body">
      <div>
        <label>Item Name</label>
        <input type="text" id="item-name" placeholder="e.g. Butter Chicken" />
      </div>
      <div>
        <label>Category</label>
        <select id="item-cat">
          <option value="Main Course">Main Course</option>
          <option value="Starter">Starter</option>
          <option value="Dessert">Dessert</option>
          <option value="Beverage">Beverage</option>
          <option value="Bread & Rice">Bread & Rice</option>
          <option value="Side Dish">Side Dish</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="row2">
        <div>
          <label>Price (₹)</label>
          <input type="number" id="item-price" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div>
          <label>Qty</label>
          <input type="number" id="item-qty" placeholder="1" min="1" value="1" />
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">＋ Add to Order</button>
    </div>
  </div>

  <!-- BILL PANEL -->
  <div class="panel">
    <div class="panel-head">
      <div class="icon">🧾</div>
      <h2>Your Order Bill</h2>
    </div>
    <div class="bill-body">

      <!-- Restaurant name -->
      <div class="restaurant-strip">
        <span style="font-size:1rem;">🍽</span>
        <input type="text" id="restaurant-name" placeholder="Restaurant name…" />
      </div>

      <!-- Summary chips -->
      <div class="summary-chips">
        <div class="chip">Items: <strong id="chip-items">0</strong></div>
        <div class="chip">Qty: <strong id="chip-qty">0</strong></div>
        <div class="chip">Subtotal: <strong id="chip-sub">₹0.00</strong></div>
      </div>

      <!-- Order list -->
      <ul id="order-list">
        <li class="empty-state">
          <span class="plate">🍽️</span>
          No items added yet.<br>Start adding your order above.
        </li>
      </ul>

      <!-- Totals -->
      <div class="totals">
        <div class="totals-inputs">
          <div>
            <label>GST / Tax %</label>
            <input type="number" id="tax-pct" value="5" min="0" max="100" step="0.5" oninput="recalc()" />
          </div>
          <div>
            <label>Tip %</label>
            <input type="number" id="tip-pct" value="0" min="0" max="100" step="0.5" oninput="recalc()" />
          </div>
        </div>
        <div class="totals-row"><span>Subtotal</span><span id="t-sub">₹0.00</span></div>
        <div class="totals-row"><span>Tax (<span id="t-tax-pct">5</span>%)</span><span id="t-tax">₹0.00</span></div>
        <div class="totals-row"><span>Tip (<span id="t-tip-pct">0</span>%)</span><span id="t-tip">₹0.00</span></div>
        <div class="totals-row grand">
          <span>Total</span>
          <span class="amount" id="t-grand">₹0.00</span>
        </div>
      </div>

      <!-- Validate -->
      <div class="validate-section">
        <div class="validate-row">
          <div>
            <label>Enter Restaurant Bill Amount (₹)</label>
            <input type="number" id="bill-amount" placeholder="Enter final bill" min="0" step="0.01" />
          </div>
          <button class="btn-validate" onclick="validateBill()">✓ Validate</button>
        </div>
        <div class="verdict" id="verdict"></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-ghost" onclick="clearAll()">🗑 Clear All</button>
        <button class="btn-ghost" onclick="printBill()">🖨 Print</button>
      </div>
    </div>
  </div>

</div>

<script>
  let orders = [];

  const fmt = n => '₹' + Number(n).toFixed(2);

  function addItem() {
    const name  = document.getElementById('item-name').value.trim();
    const cat   = document.getElementById('item-cat').value;
    const price = parseFloat(document.getElementById('item-price').value);
    const qty   = parseInt(document.getElementById('item-qty').value) || 1;

    if (!name) { flash('item-name'); return; }
    if (isNaN(price) || price < 0) { flash('item-price'); return; }

    orders.push({ id: Date.now(), name, cat, price, qty });
    renderList();
    recalc();

    // Reset
    document.getElementById('item-name').value  = '';
    document.getElementById('item-price').value = '';
    document.getElementById('item-qty').value   = '1';
    document.getElementById('item-name').focus();
  }

  function flash(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--accent)';
    el.focus();
    setTimeout(() => el.style.borderColor = '', 1000);
  }

  function changeQty(id, delta) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    o.qty = Math.max(1, o.qty + delta);
    renderList();
    recalc();
  }

  function removeItem(id) {
    orders = orders.filter(x => x.id !== id);
    renderList();
    recalc();
  }

  function renderList() {
    const ul = document.getElementById('order-list');
    if (orders.length === 0) {
      ul.innerHTML = `<li class="empty-state"><span class="plate">🍽️</span>No items added yet.<br>Start adding your order above.</li>`;
      return;
    }
    ul.innerHTML = orders.map(o => `
      <li class="order-item">
        <div>
          <div class="item-name">${escHtml(o.name)}</div>
          <div class="item-cat">${escHtml(o.cat)}</div>
        </div>
        <div class="item-qty">
          <button class="qty-btn" onclick="changeQty(${o.id},-1)">−</button>
          <span>${o.qty}</span>
          <button class="qty-btn" onclick="changeQty(${o.id},1)">+</button>
        </div>
        <div style="display:flex;align-items:center;gap:0.2rem">
          <span class="item-price">${fmt(o.price * o.qty)}</span>
          <button class="item-remove" onclick="removeItem(${o.id})" title="Remove">✕</button>
        </div>
      </li>
    `).join('');
  }

  function recalc() {
    const sub = orders.reduce((s, o) => s + o.price * o.qty, 0);
    const taxPct = parseFloat(document.getElementById('tax-pct').value) || 0;
    const tipPct = parseFloat(document.getElementById('tip-pct').value) || 0;
    const tax  = sub * taxPct / 100;
    const tip  = sub * tipPct / 100;
    const grand = sub + tax + tip;

    document.getElementById('t-sub').textContent   = fmt(sub);
    document.getElementById('t-tax').textContent   = fmt(tax);
    document.getElementById('t-tip').textContent   = fmt(tip);
    document.getElementById('t-grand').textContent = fmt(grand);
    document.getElementById('t-tax-pct').textContent = taxPct;
    document.getElementById('t-tip-pct').textContent = tipPct;

    // chips
    const totalQty = orders.reduce((s,o) => s+o.qty, 0);
    document.getElementById('chip-items').textContent = orders.length;
    document.getElementById('chip-qty').textContent   = totalQty;
    document.getElementById('chip-sub').textContent   = fmt(sub);

    // hide old verdict
    document.getElementById('verdict').style.display = 'none';
  }

  function validateBill() {
    const billStr = document.getElementById('bill-amount').value;
    if (billStr === '') return;
    const bill  = parseFloat(billStr);
    const grand = parseGrand();
    const diff  = bill - grand;
    const vd    = document.getElementById('verdict');
    vd.style.display = 'block';

    if (Math.abs(diff) < 0.5) {
      vd.className = 'verdict ok';
      vd.innerHTML = `✅ Bill matches your total (${fmt(grand)}). All good!`;
    } else if (diff > 0) {
      vd.className = 'verdict over';
      vd.innerHTML = `⚠️ Restaurant charged <span class="diff">${fmt(diff)}</span> more than your order total (${fmt(grand)}).`;
    } else {
      vd.className = 'verdict under';
      vd.innerHTML = `ℹ️ Restaurant billed <span class="diff">${fmt(Math.abs(diff))}</span> less than your order total (${fmt(grand)}). Double-check for missing items.`;
    }
  }

  function parseGrand() {
    return parseFloat(document.getElementById('t-grand').textContent.replace('₹','')) || 0;
  }

  function clearAll() {
    if (orders.length === 0) return;
    if (!confirm('Clear all items?')) return;
    orders = [];
    renderList();
    recalc();
    document.getElementById('bill-amount').value = '';
    document.getElementById('verdict').style.display = 'none';
  }

  function printBill() {
    const rest  = document.getElementById('restaurant-name').value || 'Restaurant';
    const rows  = orders.map(o =>
      `${o.name.padEnd(24)}  x${String(o.qty).padStart(2)}  ${fmt(o.price)} each  =  ${fmt(o.price*o.qty)}`
    ).join('\n');
    const sub   = document.getElementById('t-sub').textContent;
    const tax   = document.getElementById('t-tax').textContent;
    const tip   = document.getElementById('t-tip').textContent;
    const grand = document.getElementById('t-grand').textContent;
    const w     = window.open('','_blank','width=480,height=700');
    w.document.write(`<pre style="font-family:monospace;padding:2rem;font-size:13px">
========================================
  ${rest.toUpperCase()}
  Order Check — Bill Tracker
========================================
${rows || '  (no items)'}
----------------------------------------
  Subtotal                     ${sub}
  Tax                          ${tax}
  Tip                          ${tip}
========================================
  TOTAL                        ${grand}
========================================
  Printed: ${new Date().toLocaleString()}
</pre>`);
    w.print();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Allow Enter key on inputs to trigger add
  ['item-name','item-price','item-qty'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
  });
  document.getElementById('bill-amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') validateBill();
  });
</script>
</body>
</html>
